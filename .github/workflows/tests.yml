# CI test gate (2026-07-03): this repo previously had NO CI, which is how the
# stale Ollama-era document-intelligence suite masked `npm test` failures from
# March to July. Runs the build + the live suites (document-intelligence,
# download, extraction pipeline, serve, review, trusted-endpoint, gateway,
# literature).
#
# `npm ci --omit=optional` (Slice C): the local-inference consolidation removed
# node-llama-cpp, and the last optionalDependency (bonjour-service) has a build-
# safe dynamic import, so the package now builds + tests with NO optional deps and
# NO native build step. This job proves that clean-install path.
name: tests

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --omit=optional
      - run: npm run build
      - run: npm test
